- job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]  # Look for a HTTP 200 response.
    static_configs:
      - targets:
          - http://prometheus.io      # Target to probe with HTTP.
          - http://IP:3000 # Target to probe with HTTPS.
          - http://a57ed23f9c458412aa20a155221c48d2-1973915241.ap-south-1.elb.amazonaws.com/ #on which website is hosted.
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 13.232.214.2:9115  # The blackbox exporter's real hostname.

- job_name: 'jenkins'
    metrics_path: '/prometheus'
    static_configs:
      - targets:
          - 'ip:8080'


